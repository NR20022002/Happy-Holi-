<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Holi Wishing Script</title>
    <style>
        body {
            background: linear-gradient(45deg, #ff9a9e, #fad0c4, #fed0e0, #a1c4fd);
            background-size: 400% 400%;
            animation: gradient 10s ease infinite;
            text-align: center;
            font-family: 'Arial', sans-serif;
            margin: 0; padding: 0;
        }
        @keyframes gradient {
            0% {background-position: 0% 50%;}
            50% {background-position: 100% 50%;}
            100% {background-position: 0% 50%;}
        }
        .container { padding: 20px; }
        .name-box { font-size: 2.5em; color: #d63031; text-shadow: 2px 2px #fff; margin-top: 20px; font-weight: bold; }
        .main-img { width: 80%; max-width: 300px; border-radius: 20px; margin: 20px 0; box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        .wish-text { font-size: 1.5em; color: #2d3436; background: rgba(255,255,255,0.7); padding: 15px; border-radius: 15px; margin: 10px; }
        
        /* Adsterra Placeholder */
        .ad-space { margin: 20px 0; min-height: 50px; background: rgba(0,0,0,0.05); }

        .input-section { background: #fff; padding: 20px; position: fixed; bottom: 0; width: 100%; box-shadow: 0 -5px 10px rgba(0,0,0,0.1); }
        input[type="text"] { padding: 10px; width: 60%; border: 2px solid #fd79a8; border-radius: 5px; }
        .btn-share { background: #25D366; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="ad-space">
        <p style="font-size: 12px; color: #666;">Advertisement</p>
    </div>

    <div class="name-box" id="displayName">HAPPY HOLI</div>
    
    <img src="https://i.ibb.co/nqCQrDR9/20260302-140155.jpg" alt="Holi" class="main-img">

    <div class="wish-text">
        <p>बुरा न मानो होली है!</p>
        <p>आपको और आपके परिवार को रंगों के पावन पर्व <b>होली</b> की हार्दिक शुभकामनाएँ।</p>
    </div>

    <div class="ad-space">
        </div>
</div>

<div class="input-section">
    <input type="text" id="nameInput" placeholder="अपना नाम लिखें...">
    <button class="btn-share" onclick="shareWhatsApp()">WhatsApp पर भेजें</button>
</div>

<script>
    // URL से नाम प्राप्त करना
    const urlParams = new URLSearchParams(window.location.search);
    const senderName = urlParams.get('name');
    if (senderName) {
        document.getElementById('displayName').innerText = senderName + " की तरफ से";
    }

    function shareWhatsApp() {
        const name = document.getElementById('nameInput').value;
        if (name === "") {
            alert("कृपया अपना नाम डालें!");
            return;
        }
        const currentUrl = window.location.href.split('?')[0];
        const shareMsg = encodeURIComponent(name + " ने आपके लिए एक खास सरप्राइज भेजा है 🌈✨\nइसे देखने के लिए नीचे दी गई लिंक पर क्लिक करें 👇\n" + currentUrl + "?name=" + name);
        window.location.href = "whatsapp://send?text=" + shareMsg;
    }
</script>

</body>
</html>
